services:
  backend:
    build:
      context: ./backend
    container_name: meetflow_backend
    restart: unless-stopped
    environment:
      APP_SECRET_KEY: dev_secret_change_me
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEETFLOW_LLM_MODEL: ${MEETFLOW_LLM_MODEL:-gpt-4o-mini}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: meetflow_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
